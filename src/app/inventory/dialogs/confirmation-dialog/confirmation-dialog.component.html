<div class="confirmation-dialog__wrapper">
  <p-dialog [(visible)]="visible" header="Delete Confirmation" class="p-dialog-header-with-close-icon" [modal]="true"
    (onHide)="cancel()" [contentStyle]="{ 'padding': '10px 20px 10px 20px', 'border-radius': '10px'}" [draggable]="false"
    [closeOnEscape]="false" [resizable]="false">
    <div class="dialog_body w-100 mt-1">
       Are you sure you want to delete this item ?
    </div>
    <div class="dialog__footer">
      <button class="info-btn" (click)="cancel()">Cancel</button>
      <button type="button" autoid="save-button" class="primary-btn float-right m-1"
        (click)="confirm()">
        Confirm
      </button>
    </div>
  </p-dialog>
</div>
